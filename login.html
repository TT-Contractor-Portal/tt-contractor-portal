<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TT Contractor Portal</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    min-height: 100vh;
    background: #f4f6f8;
  }

  /* LEFT SIDE IMAGE */
  .login-bg {
    flex: 1;
    background: url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092?q=80&w=1600&auto=format&fit=crop") center center / cover no-repeat;
  }

  /* RIGHT SIDE PANEL */
  .login-container {
    width: 100%;
    max-width: 480px;
    background: #f4f6f8;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    box-sizing: border-box;
  }

  .login-card {
    width: 100%;
    background: #fff;
    padding: 32px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    box-sizing: border-box;
  }

  .logo {
    display: block;
    margin: 0 auto 20px;
    max-width: 140px;
  }

  h1 {
    margin-top: 0;
    margin-bottom: 8px;
    color: #035740;
    font-size: 24px;
    text-align: center;
  }

  p {
    margin-top: 0;
    margin-bottom: 24px;
    color: #555;
    text-align: center;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
    color: #222;
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 14px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #035740;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #024534;
  }

  #loginBtn {
    background: #b59a55;
  }

  #loginBtn:hover {
    background: #a38a49;
  }

  .form-links {
    display: block;
    margin-top: 4px;
    margin-bottom: 18px;
    text-align: right;
  }

  .form-links a {
    color: #035740;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
  }

  .form-links a:hover {
    text-decoration: underline;
  }

  #message {
    margin-top: 16px;
    font-size: 14px;
    min-height: 20px;
    text-align: center;
  }

  @media (max-width: 900px) {
    .login-bg {
      display: none;
    }

    .login-container {
      max-width: 100%;
    }
  }
</style>
</head>
<body>

<div class="login-bg"></div>

<div class="login-container">
  <div class="login-card">

    <img src="/images/tt-logo.png" class="logo" />

    <h1>TT Contractor Portal</h1>
    <p id="formSubtitle">Sign in to continue</p>

    <form id="loginForm">
      <label for="email">Email address</label>
      <input type="email" id="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" required />

      <div id="signupFields" style="display:none; margin-top: 10px;">
        <label for="fullName">Full name</label>
        <input type="text" id="fullName" />

        <label for="inductionComplete">Contractor induction training completed?</label>
        <select id="inductionComplete">
          <option value="">Select</option>
          <option value="true">Yes</option>
          <option value="false">No</option>
        </select>

        <label for="ptwComplete">Permit to work training completed?</label>
        <select id="ptwComplete">
          <option value="">Select</option>
          <option value="true">Yes</option>
          <option value="false">No</option>
        </select>
      </div>

      <div class="form-links" id="forgotPasswordWrap">
        <a href="/forgot-password.html">Forgot password?</a>
      </div>

      <button type="submit" id="loginBtn">Sign in</button>

      <button type="button" id="showSignupBtn" style="margin-top:10px; background:#ccc; color:#000;">
        Sign Up
      </button>

      <button type="button" id="signupBtn" style="display:none; margin-top:10px;">
        Create Account
      </button>
    </form>

    <p id="backToLoginWrap" style="display:none; margin-top:10px; text-align:center;">
      Already have an account? <a href="#" id="backToLogin">Log in</a>
    </p>

    <div id="message"></div>

  </div>
</div>

</body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://rfcwfbdcdnjpaxwztvfr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY3dmYmRjZG5qcGF4d3p0dmZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODQ5NzUsImV4cCI6MjA4OTk2MDk3NX0.9XLDNzgIXu5-i3oTvkYem3hTX2rgmF3D5vw40F8tNwQ";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");
    const formSubtitle = document.getElementById("formSubtitle");
    const loginBtn = document.getElementById("loginBtn");
    const showSignupBtn = document.getElementById("showSignupBtn");
    const signupBtn = document.getElementById("signupBtn");
    const signupFields = document.getElementById("signupFields");
    const backToLoginWrap = document.getElementById("backToLoginWrap");
    const backToLogin = document.getElementById("backToLogin");
    const forgotPasswordWrap = document.getElementById("forgotPasswordWrap");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.style.color = "#035740";
      message.textContent = "Signing in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        message.style.color = "#b42318";
        message.textContent = error.message;
        return;
      }

      const user = data.user;

      if (!user) {
        message.style.color = "#b42318";
        message.textContent = "Login failed. No user returned.";
        return;
      }

      const { data: profile, error: profileError } = await client
        .from("user_profiles")
        .select("role, is_active")
        .eq("id", user.id)
        .single();

      if (profileError || !profile) {
        message.style.color = "#b42318";
        message.textContent = "Unable to load your profile.";
        await client.auth.signOut();
        return;
      }

      if (profile.is_active === false) {
        message.style.color = "#b42318";
        message.textContent = "Your account has been deactivated. Please contact an administrator.";
        await client.auth.signOut();
        return;
      }

      await client
        .from("user_profiles")
        .update({ last_sign_in_at: new Date().toISOString() })
        .eq("id", user.id);

      message.style.color = "#035740";
      message.textContent = "Login successful...";
      window.location.href = "/index.html";
    });

    showSignupBtn.addEventListener("click", (e) => {
      e.preventDefault();
      formSubtitle.textContent = "Create your account";
      signupFields.style.display = "block";
      loginBtn.style.display = "none";
      showSignupBtn.style.display = "none";
      signupBtn.style.display = "block";
      backToLoginWrap.style.display = "block";
      forgotPasswordWrap.style.display = "none";
      message.textContent = "";
    });

    backToLogin.addEventListener("click", (e) => {
      e.preventDefault();

      formSubtitle.textContent = "Sign in to continue";
      signupFields.style.display = "none";
      loginBtn.style.display = "block";
      showSignupBtn.style.display = "block";
      signupBtn.style.display = "none";
      backToLoginWrap.style.display = "none";
      forgotPasswordWrap.style.display = "block";
      message.textContent = "";

      document.getElementById("fullName").value = "";
      document.getElementById("inductionComplete").value = "";
      document.getElementById("ptwComplete").value = "";
    });

    signupBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const fullName = document.getElementById("fullName").value.trim();
      const inductionComplete = document.getElementById("inductionComplete").value;
      const ptwComplete = document.getElementById("ptwComplete").value;

      if (!email.endsWith("@timtaylors.co.uk")) {
        message.style.color = "#b42318";
        message.textContent = "You must use a @timtaylors.co.uk email";
        return;
      }

      if (!fullName) {
        message.style.color = "#b42318";
        message.textContent = "Please enter your full name";
        return;
      }

      if (inductionComplete === "" || ptwComplete === "") {
        message.style.color = "#b42318";
        message.textContent = "Please answer both training questions";
        return;
      }

      message.style.color = "#035740";
      message.textContent = "Creating account...";

      const { data, error } = await client.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: fullName,
            induction_complete: inductionComplete === "true",
            ptw_complete: ptwComplete === "true",
            reviewer_requested:
              inductionComplete === "true" && ptwComplete === "true"
          }
        }
      });

      if (error) {
        message.style.color = "#b42318";
        message.textContent = error.message;
        return;
      }

      message.style.color = "#035740";
      message.textContent = "Account created. Please check your email and click the link to verify your account.";

      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      document.getElementById("fullName").value = "";
      document.getElementById("inductionComplete").value = "";
      document.getElementById("ptwComplete").value = "";

      setTimeout(() => {
        formSubtitle.textContent = "Sign in to continue";
        signupFields.style.display = "none";
        loginBtn.style.display = "block";
        showSignupBtn.style.display = "block";
        signupBtn.style.display = "none";
        backToLoginWrap.style.display = "none";
        forgotPasswordWrap.style.display = "block";
        message.textContent = "";
      }, 2000);
    });
  </script>

</html>
