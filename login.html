<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TT Contractor Portal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      background: #f4f6f8;
    }

    .login-background {
      flex: 1;
      background:
        linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.18)),
        url("https://images.unsplash.com/photo-1516997121675-4c2d1684aa3e?q=80&w=1600&auto=format&fit=crop") center center / cover no-repeat;
      min-height: 100vh;
    }

    .login-panel-wrap {
      width: 100%;
      max-width: 720px;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 28px;
      box-sizing: border-box;
    }

    .login-card {
      width: 100%;
      max-width: 620px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.10);
      padding: 34px 30px 28px;
      box-sizing: border-box;
      position: relative;
    }

    .logo-badge {
      width: 240px;
      max-width: 72%;
      margin: -66px auto 18px;
      background: #fff;
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-badge img {
      max-width: 120px;
      max-height: 58px;
      display: block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #1f2937;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 28px;
      color: #6b7280;
      text-align: center;
      font-size: 14px;
    }

    .section-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #1f2937;
      margin: 0 0 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      color: #222;
      text-align: left;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 13px 14px;
      margin-bottom: 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #035740;
      box-shadow: 0 0 0 3px rgba(3,87,64,0.10);
    }

    .helper-text {
      margin-top: -6px;
      margin-bottom: 16px;
      font-size: 12px;
      line-height: 1.5;
      color: #6b7280;
      text-align: left;
    }

    .helper-text strong {
      color: #b45309;
    }

    .button-row {
      display: flex;
      gap: 14px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      padding: 13px 16px;
    }

    #loginBtn {
      flex: 1;
      background: #b59a55;
      color: #fff;
    }

    #loginBtn:hover {
      background: #a38a49;
    }

    #showSignupBtn {
      width: 100%;
      margin-top: 12px;
      background: #035740;
      color: #fff;
    }

    #showSignupBtn:hover,
    #signupBtn:hover {
      background: #024534;
    }

    #signupBtn {
      width: 100%;
      margin-top: 10px;
      background: #035740;
      color: #fff;
    }

    .form-links {
      display: block;
      margin-top: 2px;
      margin-bottom: 18px;
      text-align: right;
    }

    .form-links a,
    #backToLogin {
      color: #035740;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .form-links a:hover,
    #backToLogin:hover {
      text-decoration: underline;
    }

    .divider {
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      margin: 16px 0 14px;
    }

    #backToLoginWrap {
      margin-top: 12px;
      text-align: center;
      color: #4b5563;
      font-size: 14px;
    }

    #message {
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
      text-align: center;
      font-weight: 600;
    }

    .support-box {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
      color: #6b7280;
    }

    .support-box h3 {
      margin: 0 0 14px;
      font-size: 18px;
      color: #1f2937;
    }

    .support-item {
      margin-bottom: 10px;
      font-size: 14px;
    }

    .support-item a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }

    .support-item a:hover {
      text-decoration: underline;
    }

    .powered-by {
      margin-top: 18px;
      font-size: 13px;
      color: #9ca3af;
    }

    .powered-by strong {
      color: #f97316;
    }

    @media (max-width: 1100px) {
      .login-panel-wrap {
        max-width: 620px;
      }
    }

    @media (max-width: 900px) {
      .login-background {
        display: none;
      }

      .login-panel-wrap {
        max-width: none;
        padding: 24px 16px;
      }

      .login-card {
        max-width: 520px;
      }
    }

    @media (max-width: 600px) {
      .login-card {
        padding: 26px 18px 22px;
      }

      .logo-badge {
        width: 200px;
        margin-top: -54px;
      }

      .button-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="login-background"></div>

  <div class="login-panel-wrap">
    <div class="login-card">
      <div class="logo-badge">
        <img src="/images/tt-logo.png" alt="Timothy Taylor logo">
      </div>

      <h1>Welcome To Your Portal</h1>
      <p class="subtitle" id="formSubtitle">Sign in to continue</p>

      <div class="section-title">Sign in</div>

      <form id="loginForm">
        <label for="email">Email address</label>
        <input type="email" id="email" required />

        <label for="password">Password</label>
        <input type="password" id="password" required />

        <div id="signupFields" style="display:none; margin-top: 10px;">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" />

          <label for="inductionComplete">Contractor induction training completed?</label>
          <select id="inductionComplete">
            <option value="">Select</option>
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>

          <label for="ptwComplete">Permit to work training completed?</label>
          <select id="ptwComplete">
            <option value="">Select</option>
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>

        <div class="form-links" id="forgotPasswordWrap">
          <a href="/forgot-password.html">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn">Sign in</button>

        <div class="divider">OR</div>

        <button type="button" id="showSignupBtn">
          Create New Account
        </button>

        <button type="button" id="signupBtn" style="display:none;">
          Create Account
        </button>
      </form>

      <p id="backToLoginWrap" style="display:none;">
        Already have an account? <a href="#" id="backToLogin">Log in</a>
      </p>

      <div id="message"></div>

      <div class="support-box">
        <h3>Need Help?</h3>
        <div class="support-item">
          <a href="tel:01482231733">01482 231 733</a>
        </div>
        <div class="support-item">
          <a href="mailto:support@thepowerplusgroup.com">support@thepowerplusgroup.com</a>
        </div>
        <div class="support-item">
          Mon - Fri 08:00 - 17:00
        </div>
        <div class="powered-by">
          Powered by <strong>Power Plus Group</strong>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://rfcwfbdcdnjpaxwztvfr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY3dmYmRjZG5qcGF4d3p0dmZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODQ5NzUsImV4cCI6MjA4OTk2MDk3NX0.9XLDNzgIXu5-i3oTvkYem3hTX2rgmF3D5vw40F8tNwQ";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");
    const formSubtitle = document.getElementById("formSubtitle");
    const loginBtn = document.getElementById("loginBtn");
    const showSignupBtn = document.getElementById("showSignupBtn");
    const signupBtn = document.getElementById("signupBtn");
    const signupFields = document.getElementById("signupFields");
    const backToLoginWrap = document.getElementById("backToLoginWrap");
    const backToLogin = document.getElementById("backToLogin");
    const forgotPasswordWrap = document.getElementById("forgotPasswordWrap");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.style.color = "#035740";
      message.textContent = "Signing in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        message.style.color = "#b42318";
        message.textContent = error.message;
        return;
      }

      const user = data.user;

      if (!user) {
        message.style.color = "#b42318";
        message.textContent = "Login failed. No user returned.";
        return;
      }

      const { data: profile, error: profileError } = await client
        .from("user_profiles")
        .select("role, is_active")
        .eq("id", user.id)
        .single();

      if (profileError || !profile) {
        message.style.color = "#b42318";
        message.textContent = "Unable to load your profile.";
        await client.auth.signOut();
        return;
      }

      if (profile.is_active === false) {
        message.style.color = "#b42318";
        message.textContent = "Your account has been deactivated. Please contact an administrator.";
        await client.auth.signOut();
        return;
      }

      await client
        .from("user_profiles")
        .update({ last_sign_in_at: new Date().toISOString() })
        .eq("id", user.id);

      message.style.color = "#035740";
      message.textContent = "Login successful...";
      window.location.href = "/index.html";
    });

    showSignupBtn.addEventListener("click", (e) => {
      e.preventDefault();
      formSubtitle.textContent = "Create your account";
      signupFields.style.display = "block";
      loginBtn.style.display = "none";
      showSignupBtn.style.display = "none";
      signupBtn.style.display = "block";
      backToLoginWrap.style.display = "block";
      forgotPasswordWrap.style.display = "none";
      message.textContent = "";
    });

    backToLogin.addEventListener("click", (e) => {
      e.preventDefault();

      formSubtitle.textContent = "Sign in to continue";
      signupFields.style.display = "none";
      loginBtn.style.display = "block";
      showSignupBtn.style.display = "block";
      signupBtn.style.display = "none";
      backToLoginWrap.style.display = "none";
      forgotPasswordWrap.style.display = "block";
      message.textContent = "";

      document.getElementById("fullName").value = "";
      document.getElementById("inductionComplete").value = "";
      document.getElementById("ptwComplete").value = "";
    });

    signupBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const fullName = document.getElementById("fullName").value.trim();
      const inductionComplete = document.getElementById("inductionComplete").value;
      const ptwComplete = document.getElementById("ptwComplete").value;

      if (!email.endsWith("@timtaylors.co.uk")) {
        message.style.color = "#b42318";
        message.textContent = "You must use a @timtaylors.co.uk email";
        return;
      }

      if (!fullName) {
        message.style.color = "#b42318";
        message.textContent = "Please enter your full name";
        return;
      }

      if (inductionComplete === "" || ptwComplete === "") {
        message.style.color = "#b42318";
        message.textContent = "Please answer both training questions";
        return;
      }

      message.style.color = "#035740";
      message.textContent = "Creating account...";

      const { data, error } = await client.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: fullName,
            induction_complete: inductionComplete === "true",
            ptw_complete: ptwComplete === "true",
            reviewer_requested:
              inductionComplete === "true" && ptwComplete === "true"
          }
        }
      });

      if (error) {
        message.style.color = "#b42318";
        message.textContent = error.message;
        return;
      }

      message.style.color = "#035740";
      message.textContent = "Account created. Please check your email and click the link to verify your account.";

      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      document.getElementById("fullName").value = "";
      document.getElementById("inductionComplete").value = "";
      document.getElementById("ptwComplete").value = "";

      setTimeout(() => {
        formSubtitle.textContent = "Sign in to continue";
        signupFields.style.display = "none";
        loginBtn.style.display = "block";
        showSignupBtn.style.display = "block";
        signupBtn.style.display = "none";
        backToLoginWrap.style.display = "none";
        forgotPasswordWrap.style.display = "block";
        message.textContent = "";
      }, 2000);
    });
  </script>
</body>
</html>
