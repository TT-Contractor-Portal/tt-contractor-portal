<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TT Contractor Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
    }

    /* LEFT SIDE BACKGROUND */
    .bg {
      flex: 1;
      background: url("https://images.unsplash.com/photo-1600271886742-f049cd451bba?q=80&w=1600") center/cover no-repeat;
    }

    /* RIGHT SIDE PANEL */
    .login-container {
      width: 420px;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .login-card {
      width: 100%;
      background: white;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      width: 140px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      color: #222;
    }

    p {
      margin: 0 0 20px 0;
      color: #666;
      font-size: 14px;
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 13px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #a58a4a;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: #8c733c;
    }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: #e5e5e5;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }

    .btn-green {
      width: 100%;
      padding: 12px;
      background: #035740;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }

    .form-links {
      text-align: right;
      margin-bottom: 12px;
    }

    .form-links a {
      font-size: 13px;
      color: #035740;
      text-decoration: none;
    }

    .form-links a:hover {
      text-decoration: underline;
    }

    #message {
      margin-top: 12px;
      font-size: 14px;
      color: #b42318;
    }

    @media (max-width: 900px) {
      .bg {
        display: none;
      }

      .login-container {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="login-container">
    <div class="login-card">

      <img src="/images/tt-logo.png" class="logo" />

      <h1>Welcome To Your Portal</h1>
      <p id="formSubtitle">Sign in to continue</p>

      <form id="loginForm">

        <label>Email address</label>
        <input type="email" id="email" required />

        <label>Password</label>
        <input type="password" id="password" required />

        <div id="signupFields" style="display:none;">

          <label>Full name</label>
          <input type="text" id="fullName" />

          <label>Contractor induction training completed?</label>
          <select id="inductionComplete">
            <option value="">Select</option>
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>

          <label>Permit to work training completed?</label>
          <select id="ptwComplete">
            <option value="">Select</option>
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>

        </div>

        <div class="form-links" id="forgotPasswordWrap">
          <a href="/forgot-password.html">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn" class="btn-primary">Sign in</button>

        <button type="button" id="showSignupBtn" class="btn-secondary">
          Create New Account
        </button>

        <button type="button" id="signupBtn" class="btn-green" style="display:none;">
          Create Account
        </button>

      </form>

      <p id="backToLoginWrap" style="display:none; margin-top:10px;">
        Already have an account?
        <a href="#" id="backToLogin">Log in</a>
      </p>

      <div id="message"></div>

    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://rfcwfbdcdnjpaxwztvfr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY3dmYmRjZG5qcGF4d3p0dmZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODQ5NzUsImV4cCI6MjA4OTk2MDk3NX0.9XLDNzgIXu5-i3oTvkYem3hTX2rgmF3D5vw40F8tNwQ";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

   const form = document.getElementById("loginForm");
const message = document.getElementById("message");
const formSubtitle = document.getElementById("formSubtitle");
const loginBtn = document.getElementById("loginBtn");
const showSignupBtn = document.getElementById("showSignupBtn");
const signupBtn = document.getElementById("signupBtn");
const signupFields = document.getElementById("signupFields");
const backToLoginWrap = document.getElementById("backToLoginWrap");
const backToLogin = document.getElementById("backToLogin");
const forgotPasswordWrap = document.getElementById("forgotPasswordWrap");
  form.addEventListener("submit", async (e) => {
  e.preventDefault();

  message.textContent = "Signing in...";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    message.textContent = error.message;
    return;
  }

  const user = data.user;

  if (!user) {
    message.textContent = "Login failed. No user returned.";
    return;
  }

  const { data: profile, error: profileError } = await client
    .from("user_profiles")
    .select("role, is_active")
    .eq("id", user.id)
    .single();

  if (profileError || !profile) {
    message.textContent = "Unable to load your profile.";
    await client.auth.signOut();
    return;
  }

  if (profile.is_active === false) {
    message.textContent = "Your account has been deactivated. Please contact an administrator.";
    await client.auth.signOut();
    return;
  }

  await client
    .from("user_profiles")
    .update({ last_sign_in_at: new Date().toISOString() })
    .eq("id", user.id);

  message.textContent = "Login successful...";
  window.location.href = "/index.html";
});

showSignupBtn.addEventListener("click", (e) => {
  e.preventDefault();
  formSubtitle.textContent = "Create your account";
  signupFields.style.display = "block";
  loginBtn.style.display = "none";
  showSignupBtn.style.display = "none";
  signupBtn.style.display = "block";
  backToLoginWrap.style.display = "block";
  forgotPasswordWrap.style.display = "none";
  message.textContent = "";
});

backToLogin.addEventListener("click", (e) => {
  e.preventDefault();

  formSubtitle.textContent = "Sign in to continue";
  signupFields.style.display = "none";
  loginBtn.style.display = "block";
  showSignupBtn.style.display = "block";
  signupBtn.style.display = "none";
  backToLoginWrap.style.display = "none";
  forgotPasswordWrap.style.display = "block";
  message.textContent = "";

  document.getElementById("fullName").value = "";
  document.getElementById("inductionComplete").value = "";
  document.getElementById("ptwComplete").value = "";
});
signupBtn.addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const fullName = document.getElementById("fullName").value.trim();
  console.log("FULL NAME:", fullName);
  const inductionComplete = document.getElementById("inductionComplete").value;
  const ptwComplete = document.getElementById("ptwComplete").value;

  if (!email.endsWith("@timtaylors.co.uk")) {
    message.textContent = "You must use a @timtaylors.co.uk email";
    return;
  }

  if (!fullName) {
    message.textContent = "Please enter your full name";
    return;
  }

  if (inductionComplete === "" || ptwComplete === "") {
    message.textContent = "Please answer both training questions";
    return;
  }

  message.textContent = "Creating account...";

const { data, error } = await client.auth.signUp({
  email,
  password,
  options: {
    data: {
      full_name: fullName,
      induction_complete: inductionComplete === "true",
      ptw_complete: ptwComplete === "true",
      reviewer_requested:
        inductionComplete === "true" && ptwComplete === "true"
    }
  }
});

if (error) {
  message.textContent = error.message;
  return;
}


message.textContent = "Account created. Please check your email and click the link to verify your account.";

// clear form fields
document.getElementById("email").value = "";
document.getElementById("password").value = "";
document.getElementById("fullName").value = "";
document.getElementById("inductionComplete").value = "";
document.getElementById("ptwComplete").value = "";

// switch back to login mode after 2 seconds
setTimeout(() => {
  formSubtitle.textContent = "Sign in to continue";
  signupFields.style.display = "none";
  loginBtn.style.display = "block";
  showSignupBtn.style.display = "block";
  signupBtn.style.display = "none";
  backToLoginWrap.style.display = "none";
  forgotPasswordWrap.style.display = "block";
  message.textContent = "";
}, 2000);
});
 
  </script>
</body>
</html>
