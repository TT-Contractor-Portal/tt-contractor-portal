<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TT Contractor Portal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      color: #035740;
      font-size: 28px;
    }

    p {
      margin-top: 0;
      margin-bottom: 24px;
      color: #555;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #222;
    }

   input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #035740;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #024534;
    }

    #message {
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>TT Contractor Portal</h1>
    <p>Create your account</p>

    <form id="loginForm">
      <label for="email">Email address</label>
      <input type="email" id="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" required />
<div id="signupFields" style="display:none; margin-top: 10px;">
  <label for="fullName">Full name</label>
  <input type="text" id="fullName" />

  <label for="inductionComplete">Contractor induction training completed?</label>
  <select id="inductionComplete">
    <option value="">Select</option>
    <option value="true">Yes</option>
    <option value="false">No</option>
  </select>

  <label for="ptwComplete">Permit to work training completed?</label>
  <select id="ptwComplete">
    <option value="">Select</option>
    <option value="true">Yes</option>
    <option value="false">No</option>
  </select>
</div>
    
<button type="button" id="showSignupBtn" style="margin-top:10px; background:#ccc; color:#000;">
  Sign Up
</button>
<button type="button" id="signupBtn" style="display:none; margin-top:10px; background:#035740; color:#fff;">
  Create Account
</button>
    </form>
    
<p style="margin-top:10px; text-align:center;">
  Already have an account? <a href="login.html">Log in</a>
</p>
    <div id="message"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://rfcwfbdcdnjpaxwztvfr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY3dmYmRjZG5qcGF4d3p0dmZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODQ5NzUsImV4cCI6MjA4OTk2MDk3NX0.9XLDNzgIXu5-i3oTvkYem3hTX2rgmF3D5vw40F8tNwQ";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

const showSignupBtn = document.getElementById("showSignupBtn");
const signupBtn = document.getElementById("signupBtn");
const signupFields = document.getElementById("signupFields");
    
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.textContent = "Signing in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        message.textContent = error.message;
        return;
      }

      message.textContent = "Login successful...";
      window.location.href = "index.html";
    });

showSignupBtn.addEventListener("click", () => {
  signupFields.style.display = "block";
  signupBtn.style.display = "block";
  showSignupBtn.style.display = "none";
  form.querySelector('button[type="submit"]').style.display = "none";
  document.querySelector(".login-card p").textContent = "Create your account";
  message.textContent = "";
});
    
signupBtn.addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const fullName = document.getElementById("fullName").value.trim();
  const inductionComplete = document.getElementById("inductionComplete").value;
  const ptwComplete = document.getElementById("ptwComplete").value;

  if (!email.endsWith("@timtaylors.co.uk")) {
    message.textContent = "You must use a @timtaylors.co.uk email";
    return;
  }

  if (!fullName) {
    message.textContent = "Please enter your full name";
    return;
  }

  if (inductionComplete === "" || ptwComplete === "") {
    message.textContent = "Please answer both training questions";
    return;
  }

  message.textContent = "Creating account...";

  const { data, error } = await client.auth.signUp({
    email,
    password
  });

  if (error) {
    message.textContent = error.message;
    return;
  }

  message.textContent = "Account created. Check your email if confirmation is turned on.";
});
 
  </script>
</body>
</html>
