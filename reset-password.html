<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - TT Contractor Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      padding: 32px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
      color: #035740;
    }

    p {
      margin: 0 0 20px 0;
      color: #555;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #035740;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #024634;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      display: block;
      background: #e8f6ef;
      color: #035740;
      border: 1px solid #b7e4c7;
    }

    .message.error {
      display: block;
      background: #fdeaea;
      color: #a12626;
      border: 1px solid #f3b0b0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set New Password</h1>
    <p>Please enter your new password below.</p>

    <form id="resetPasswordForm">
      <label for="password">New password</label>
      <input type="password" id="password" required minlength="8" />

      <label for="confirmPassword">Confirm new password</label>
      <input type="password" id="confirmPassword" required minlength="8" />

      <button type="submit">Update Password</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://rfcwfbdcdnjpaxwztvfr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY3dmYmRjZG5qcGF4d3p0dmZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODQ5NzUsImV4cCI6MjA4OTk2MDk3NX0.9XLDNzgIXu5-i3oTvkYem3hTX2rgmF3D5vw40F8tNwQ";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("resetPasswordForm");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const messageBox = document.getElementById("message");

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = "message " + type;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = passwordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (password.length < 8) {
        showMessage("Password must be at least 8 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: password
      });

      if (error) {
        showMessage(error.message, "error");
        return;
      }

      showMessage("Password updated successfully. Redirecting to login...", "success");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1800);
    });
  </script>
</body>
</html>
