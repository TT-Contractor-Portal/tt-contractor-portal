<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Approved Quality Suppliers - TT Contractor Portal</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; color: #222; }
    .sidebar { position: fixed; top: 0; left: 0; width: 240px; height: 100vh; background: #035740; color: white; padding: 24px 20px; box-sizing: border-box; }
    .sidebar a { display: block; color: white; text-decoration: none; margin: 14px 0; font-size: 16px; }
    .sidebar-logo { text-align: center; margin-bottom: 20px; }
    .sidebar-logo img { max-width: 140px; }
    .main { margin-left: 240px; padding: 20px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .logout-btn { background: #035740; color: white; border: none; padding: 8px 14px; cursor: pointer; border-radius: 5px; }

    .company-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .company-card:hover { transform: translateY(-3px); }
    .company-name { font-size: 18px; font-weight: bold; }
    .company-meta { margin-top: 6px; color: #666; font-size: 14px; }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 6px;
    }

    .approved { background: #d1e7dd; color: #0f5132; }
    .expired { background: #f8d7da; color: #842029; }
    .raw { background: #e7f1ff; color: #084298; }
    .packaging { background: #e9f7ef; color: #0f5132; }
    .service { background: #f3e8ff; color: #581c87; }

    .back-link { color: #035740; text-decoration: none; font-weight: bold; }
    .error { background: #f8d7da; color: #842029; padding: 12px; border-radius: 8px; margin: 15px 0; display: none; }
  </style>
</head>
<body>

 <div class="sidebar">

  <div class="sidebar-logo">
    <img src="/images/tt-logo.png" alt="Logo">
  </div>

  <h1>TT Contractor Portal</h1>

    <a href="/index.html">Dashboard</a>
    <a href="/admin-users.html" id="adminNavLink" style="display:none;">Admin</a>
    <a href="/rams/register.html">RAMS</a>
    <a href="/rams/new.html">New RAMS</a>
    <a href="/profile/index.html">My Profile</a>
    <a href="/ttcontractors/index.html">Contractors</a>
    <a href="/quality-suppliers/index.html">Quality Suppliers</a>
    <a href="/permits/index.html">Permits</a>
    <a href="/sop/index.html">SOP / SSW</a>
  </div>


  <div class="main">

    <div class="topbar">
      <div id="welcomeText">Welcome</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <h1>Approved Quality Suppliers</h1>
    <a class="back-link" href="/quality-suppliers/index.html">← Back</a>

    <div id="errorBox" class="error"></div>

    <div id="companyList" style="margin-top:20px;">
      Loading...
    </div>

  </div>

<script>
  const SUPABASE_URL = "https://rfcwfbdcdnjpaxwztvfr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY3dmYmRjZG5qcGF4d3p0dmZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODQ5NzUsImV4cCI6MjA4OTk2MDk3NX0.9XLDNzgIXu5-i3oTvkYem3hTX2rgmF3D5vw40F8tNwQ";

  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    const { data: { user }, error: userError } = await client.auth.getUser();

    if (userError || !user) {
      window.location.href = "/login.html";
      return;
    }

    const { data: profile, error: profileError } = await client
      .from("user_profiles")
      .select("*")
      .eq("id", user.id)
      .single();

    if (profileError || !profile) {
      showError("Could not load your user profile.");
      return;
    }

    document.getElementById("welcomeText").innerText =
      `Welcome, ${profile.full_name || "User"} — ${profile.role}`;

    const adminNavLink = document.getElementById("adminNavLink");

if (adminNavLink) {
  adminNavLink.style.display = profile.role === "admin" ? "block" : "none";
}
    await loadCompanies();
  }

  async function loadCompanies() {
    const { data, error } = await client
      .from("quality_supplier_companies")
      .select(`
        id,
        company_name,
        supplier_type,
        status,
        approved_at,
        expires_at,
        quality_suppliers (
          id,
          contact_name,
          email,
          phone,
          status
        )
      `)
      .in("status", ["Approved", "Expired"])
      .order("company_name", { ascending: true });

    if (error) {
      console.error(error);
      document.getElementById("companyList").innerText = "Error loading suppliers";
      showError(error.message);
      return;
    }

    if (!data || data.length === 0) {
   document.getElementById("companyList").innerText = "No approved or expired quality suppliers found.";
      return;
    }

    document.getElementById("companyList").innerHTML = data.map(company => {
      const statusClass = company.status === "Expired" ? "expired" : "approved";
      const typeClass = getTypeClass(company.supplier_type);
      const contacts = company.quality_suppliers || [];

      const expiryText = company.expires_at
        ? new Date(company.expires_at).toLocaleDateString("en-GB")
        : "No expiry date";

      return `
        <div class="company-card" onclick="openCompany('${company.id}')">
          <div class="company-name">
            ${escapeHtml(company.company_name || "-")}
            <span class="badge ${statusClass}">${escapeHtml(company.status || "-")}</span>
            <span class="badge ${typeClass}">${escapeHtml(company.supplier_type || "-")}</span>
          </div>
          <div class="company-meta">
            ${contacts.length} contact${contacts.length === 1 ? "" : "s"} · Expires: ${expiryText}
          </div>
        </div>
      `;
    }).join("");
  }

  function openCompany(companyId) {
    window.location.href = `/quality-suppliers/profile.html?company_id=${companyId}`;
  }

  function getTypeClass(type) {
    if (type === "Raw Material Supplier") return "raw";
    if (type === "Packaging Supplier") return "packaging";
    return "service";
  }

  function showError(message) {
    const box = document.getElementById("errorBox");
    box.style.display = "block";
    box.innerText = message;
  }

  function escapeHtml(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function logout() {
    await client.auth.signOut();
    window.location.href = "/login.html";
  }

  init();
</script>

</body>
</html>
