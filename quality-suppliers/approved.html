<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Approved Quality Suppliers - TT Contractor Portal</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; color: #222; }

    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px; height: 100vh;
      background: #035740;
      color: white;
      padding: 24px 20px;
      box-sizing: border-box;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 14px 0;
      font-size: 16px;
    }

    .sidebar-logo { text-align: center; margin-bottom: 20px; }
    .sidebar-logo img { max-width: 140px; }

    .main { margin-left: 240px; padding: 20px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .logout-btn {
      background: #035740;
      color: white;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 5px;
    }

    .company-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .company-card:hover {
      transform: translateY(-3px);
    }

    .company-name {
      font-size: 18px;
      font-weight: bold;
    }

    .company-meta {
      margin-top: 6px;
      color: #666;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-left: 6px;
    }

    .approved { background: #d1e7dd; color: #0f5132; }
    .expired { background: #f8d7da; color: #842029; }

    .back-link {
      color: #035740;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="/images/tt-logo.png" alt="TT Logo" />
    </div>

    <a href="/index.html">Dashboard</a>
    <a href="/new-rams.html">New RAMS Review</a>
    <a href="/rams-register.html">RAMS Register</a>
    <a href="/ttcontractors/index.html">Contractor Register</a>
    <a href="/quality-suppliers/index.html">Quality Supplier Register</a>
    <a href="/admin/users.html" id="adminLink">Admin</a>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <div id="welcomeText">Welcome</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <h1>Approved Quality Suppliers</h1>
    <a class="back-link" href="/quality-suppliers/index.html">← Back</a>

    <div id="companyList" style="margin-top:20px;">
      Loading...
    </div>

  </div>

<script>
  const SUPABASE_URL = "https://rfcwfbdcdnjpaxwztvfr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY3dmYmRjZG5qcGF4d3p0dmZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODQ5NzUsImV4cCI6MjA4OTk2MDk3NX0.9XLDNzgIXu5-i3oTvkYem3hTX2rgmF3D5vw40F8tNwQ";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    const { data: { user } } = await supabase.auth.getUser();

    if (!user) {
      window.location.href = "/login.html";
      return;
    }

    const { data: profile } = await supabase
      .from("user_profiles")
      .select("*")
      .eq("id", user.id)
      .single();

    document.getElementById("welcomeText").innerText =
      `Welcome, ${profile.full_name} — ${profile.role}`;

    if (profile.role !== "admin") {
      document.getElementById("adminLink").style.display = "none";
    }

    loadSuppliers();
  }

  async function loadSuppliers() {
    const { data, error } = await supabase
      .from("quality_suppliers")
      .select("*")
      .in("status", ["Approved", "Expired"]);

    if (error) {
      console.error(error);
      document.getElementById("companyList").innerText = "Error loading suppliers";
      return;
    }

    if (!data.length) {
      document.getElementById("companyList").innerText = "No approved suppliers found";
      return;
    }

    // Group by company
    const grouped = {};

    data.forEach(s => {
      if (!grouped[s.company_name]) {
        grouped[s.company_name] = [];
      }
      grouped[s.company_name].push(s);
    });

    const html = Object.keys(grouped).map(company => {
      const suppliers = grouped[company];

      const approvedCount = suppliers.filter(s => s.status === "Approved").length;
      const expiredCount = suppliers.filter(s => s.status === "Expired").length;

      return `
        <div class="company-card" onclick="openCompany('${company}')">
          <div class="company-name">${company}</div>
          <div class="company-meta">
            ${approvedCount} Approved
            ${expiredCount ? `<span class="badge expired">${expiredCount} Expired</span>` : ""}
          </div>
        </div>
      `;
    }).join("");

    document.getElementById("companyList").innerHTML = html;
  }

  function openCompany(company) {
    window.location.href = `/quality-suppliers/company.html?company=${encodeURIComponent(company)}`;
  }

  async function logout() {
    await supabase.auth.signOut();
    window.location.href = "/login.html";
  }

  init();
</script>

</body>
</html>
